<!DOCTYPE html>
<html lang="ko">
  <head>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./index.css" />
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>

    <script type="module" src="./script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <div id="app">
      <header>🎱 행운의 로또</header>
      <div>
        <p>구입할 금액을 입력해주세요.</p>
        <div>
          <input type="text" id="userMoney" />
          <button type="submit" id="purchaseLotto">구입</button>
        </div>
        <div id="lottos" class="hidden">
          <ul id="lottoList"></ul>
        </div>

        <div id="checkUserNumber" class="hidden">
          <ul>
            <li><input type="text" id="firstNumber" /></li>
            <li><input type="text" id="secondNumber" /></li>
            <li><input type="text" id="thirdNumber" /></li>
            <li><input type="text" id="fourthNumber" /></li>
            <li><input type="text" id="fifthNumber" /></li>
            <li><input type="text" id="sixthNumber" /></li>
          </ul>
          <input type="text" id="bonusNumber" />
          <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>

          <button id="checkResult">내 결과 보기</button>
        </div>
        <div id="results" class="ddhidden">
          <h2>🏆 당첨 통계 🏆</h2>
          <table>
            <thead>
              <tr>
                <th>일치 갯수</th>
                <th>당첨금</th>
                <th>당첨 갯수</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th>
                  <p>3개</p>
                </th>
                <th>
                  <p id="threeMatchPrice"></p>
                </th>
                <th>
                  <p id="threeMatchAmount">n개</p>
                </th>
              </tr>
              <tr>
                <th>
                  <p>4개</p>
                </th>
                <th>
                  <p id="fourMatchPrice"></p>
                </th>
                <th>
                  <p id="fourMatchAmount">n개</p>
                </th>
              </tr>
              <tr>
                <th>
                  <p>5개</p>
                </th>
                <th>
                  <p id="fiveMatchPrice"></p>
                </th>
                <th>
                  <p id="fiveMatchAmount">n개</p>
                </th>
              </tr>
              <tr>
                <th>
                  <p>5개+보너스볼</p>
                </th>
                <th>
                  <p id="fiveMatchWithBonusPrice"></p>
                </th>
                <th>
                  <p id="fiveMatchWithBonusAmount">n개</p>
                </th>
              </tr>
              <tr>
                <th>
                  <p>6개</p>
                </th>
                <th>
                  <p id="sixMatchPrice"></p>
                </th>
                <th>
                  <p id="sixMatchAmount">n개</p>
                </th>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <footer>
        <p>copyright 2025. spoyodevelop</p>
      </footer>
    </div>
    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
